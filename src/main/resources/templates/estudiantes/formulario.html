<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${titulo}">Formulario</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 30px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 4px; }
        input[type=text], input[type=email] {
            width: 350px; padding: 8px;
            border: 1px solid #ccc; border-radius: 4px;
        }
        .error { color: #c0392b; font-size: 0.9em; }
        button { padding: 8px 16px; background-color: #1a3a6b;
                 color: white; border: none; border-radius: 4px; cursor: pointer; }
        a { color: #1a3a6b; text-decoration: none; margin-left: 10px; }
    </style>
</head>
<body>
    <h1 th:text="${titulo}"></h1>

    <form th:action="@{/estudiantes/guardar}" th:object="${estudiante}" method="post">
        <input type="hidden" th:field="*{id}" />

        <div class="form-group">
            <label>Nombre:</label>
            <input type="text" th:field="*{nombre}" placeholder="Ej: Juan" />
            <span class="error" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></span>
        </div>

        <div class="form-group">
            <label>Apellido:</label>
            <input type="text" th:field="*{apellido}" placeholder="Ej: Pérez" />
            <span class="error" th:if="${#fields.hasErrors('apellido')}" th:errors="*{apellido}"></span>
        </div>

        <div class="form-group">
            <label>Correo:</label>
            <input type="email" th:field="*{correo}" placeholder="Ej: juan@correo.com" />
            <span class="error" th:if="${#fields.hasErrors('correo')}" th:errors="*{correo}"></span>
        </div>

        <div class="form-group">
            <label>Carrera:</label>
            <input type="text" th:field="*{carrera}" placeholder="Ej: Ingeniería de Sistemas" />
            <span class="error" th:if="${#fields.hasErrors('carrera')}" th:errors="*{carrera}"></span>
        </div>

        <button type="submit">Guardar</button>
        <a th:href="@{/estudiantes}">Cancelar</a>
    </form>
</body>
</html>
